version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build: ./server

    container_name: shubha-server

    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

    environment:
      MONGO_URI: mongodb://mongodb:27017/mern_db
      PORT: 5000

  frontend:
    build: ./frontend

    container_name: shubha-frontend

    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo-data: