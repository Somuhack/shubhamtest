name: MERN Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Backend
      - name: Install Backend Dependencies
        working-directory: server
        run: npm ci

      - name: Build Backend
        working-directory: server
        run: npm run build --if-present

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: client
        run: npm ci

      - name: Build Frontend
        working-directory: client
        run: npm run build

      # Verify Backend Docker Image
      - name: Build Backend Docker Image
        run: docker build -t shophub-backend ./server

      # Verify Frontend Docker Image
      - name: Build Frontend Docker Image
        run: docker build -t shophub-frontend ./client

  deploy-backend:
    name: Deploy Backend
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Backend Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Frontend Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"